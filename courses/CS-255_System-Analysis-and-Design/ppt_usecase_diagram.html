<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriverPass Use Case Diagram - PowerPoint Version</title>
    <style>
        @media print {
            body {
                margin: 0;
                padding: 0;
            }
        }
        
        body {
            font-family: Arial, sans-serif;
            padding: 0;
            background: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        svg {
            width: 100%;
            max-width: 1200px;
            height: auto;
            background: white;
        }
        .actor {
            fill: none;
            stroke: #000;
            stroke-width: 2;
        }
        .usecase {
            fill: #e8f4f8;
            stroke: #2c3e50;
            stroke-width: 2;
        }
        .system-boundary {
            fill: none;
            stroke: #2c3e50;
            stroke-width: 3;
            stroke-dasharray: 5,5;
        }
        .association {
            stroke: #000;
            stroke-width: 1.5;
            fill: none;
        }
        .label {
            font-family: Arial, sans-serif;
            font-size: 13px;
            fill: #000;
            font-weight: 500;
        }
        .actor-label {
            font-family: Arial, sans-serif;
            font-size: 14px;
            fill: #000;
            font-weight: bold;
        }
        .system-label {
            font-family: Arial, sans-serif;
            font-size: 18px;
            fill: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
        <!-- System Boundary -->
        <rect x="180" y="70" width="840" height="780" class="system-boundary" rx="10"/>
        <text x="600" y="55" class="system-label" text-anchor="middle">DriverPass System</text>
        
        <!-- Left Side Actors -->
        <!-- Customer -->
        <circle cx="80" cy="200" r="18" class="actor"/>
        <line x1="80" y1="218" x2="80" y2="260" class="actor"/>
        <line x1="80" y1="235" x2="55" y2="252" class="actor"/>
        <line x1="80" y1="235" x2="105" y2="252" class="actor"/>
        <line x1="80" y1="260" x2="55" y2="285" class="actor"/>
        <line x1="80" y1="260" x2="105" y2="285" class="actor"/>
        <text x="80" y="305" class="actor-label" text-anchor="middle">Customer</text>
        
        <!-- Secretary -->
        <circle cx="80" cy="400" r="18" class="actor"/>
        <line x1="80" y1="418" x2="80" y2="460" class="actor"/>
        <line x1="80" y1="435" x2="55" y2="452" class="actor"/>
        <line x1="80" y1="435" x2="105" y2="452" class="actor"/>
        <line x1="80" y1="460" x2="55" y2="485" class="actor"/>
        <line x1="80" y1="460" x2="105" y2="485" class="actor"/>
        <text x="80" y="505" class="actor-label" text-anchor="middle">Secretary</text>
        
        <!-- Driver -->
        <circle cx="80" cy="600" r="18" class="actor"/>
        <line x1="80" y1="618" x2="80" y2="660" class="actor"/>
        <line x1="80" y1="635" x2="55" y2="652" class="actor"/>
        <line x1="80" y1="635" x2="105" y2="652" class="actor"/>
        <line x1="80" y1="660" x2="55" y2="685" class="actor"/>
        <line x1="80" y1="660" x2="105" y2="685" class="actor"/>
        <text x="80" y="705" class="actor-label" text-anchor="middle">Driver</text>
        
        <!-- Right Side Actors -->
        <!-- IT Officer -->
        <circle cx="1120" cy="250" r="18" class="actor"/>
        <line x1="1120" y1="268" x2="1120" y2="310" class="actor"/>
        <line x1="1120" y1="285" x2="1095" y2="302" class="actor"/>
        <line x1="1120" y1="285" x2="1145" y2="302" class="actor"/>
        <line x1="1120" y1="310" x2="1095" y2="335" class="actor"/>
        <line x1="1120" y1="310" x2="1145" y2="335" class="actor"/>
        <text x="1120" y="355" class="actor-label" text-anchor="middle">IT Officer</text>
        
        <!-- Owner -->
        <circle cx="1120" cy="500" r="18" class="actor"/>
        <line x1="1120" y1="518" x2="1120" y2="560" class="actor"/>
        <line x1="1120" y1="535" x2="1095" y2="552" class="actor"/>
        <line x1="1120" y1="535" x2="1145" y2="552" class="actor"/>
        <line x1="1120" y1="560" x2="1095" y2="585" class="actor"/>
        <line x1="1120" y1="560" x2="1145" y2="585" class="actor"/>
        <text x="1120" y="605" class="actor-label" text-anchor="middle">Owner</text>
        
        <!-- DMV System -->
        <circle cx="1120" cy="750" r="18" class="actor"/>
        <line x1="1120" y1="768" x2="1120" y2="810" class="actor"/>
        <line x1="1120" y1="785" x2="1095" y2="802" class="actor"/>
        <line x1="1120" y1="785" x2="1145" y2="802" class="actor"/>
        <line x1="1120" y1="810" x2="1095" y2="835" class="actor"/>
        <line x1="1120" y1="810" x2="1145" y2="835" class="actor"/>
        <text x="1120" y="855" class="actor-label" text-anchor="middle">DMV System</text>
        
        <!-- Use Cases - Column 1 -->
        <ellipse cx="300" cy="120" rx="80" ry="30" class="usecase"/>
        <text x="300" y="125" class="label" text-anchor="middle">Register Account</text>
        
        <ellipse cx="300" cy="190" rx="80" ry="30" class="usecase"/>
        <text x="300" y="195" class="label" text-anchor="middle">Login to System</text>
        
        <ellipse cx="300" cy="260" rx="80" ry="30" class="usecase"/>
        <text x="300" y="265" class="label" text-anchor="middle">Select Package</text>
        
        <ellipse cx="300" cy="330" rx="80" ry="30" class="usecase"/>
        <text x="300" y="335" class="label" text-anchor="middle">Schedule Lesson</text>
        
        <ellipse cx="300" cy="400" rx="80" ry="30" class="usecase"/>
        <text x="300" y="405" class="label" text-anchor="middle">Modify Appointment</text>
        
        <ellipse cx="300" cy="470" rx="80" ry="30" class="usecase"/>
        <text x="300" y="475" class="label" text-anchor="middle">Cancel Appointment</text>
        
        <!-- Use Cases - Column 2 -->
        <ellipse cx="500" cy="120" rx="80" ry="30" class="usecase"/>
        <text x="500" y="125" class="label" text-anchor="middle">Take Practice Test</text>
        
        <ellipse cx="500" cy="190" rx="80" ry="30" class="usecase"/>
        <text x="500" y="195" class="label" text-anchor="middle">View Test Progress</text>
        
        <ellipse cx="500" cy="260" rx="80" ry="30" class="usecase"/>
        <text x="500" y="265" class="label" text-anchor="middle">View Lesson History</text>
        
        <ellipse cx="500" cy="330" rx="80" ry="30" class="usecase"/>
        <text x="500" y="335" class="label" text-anchor="middle">Process Payment</text>
        
        <ellipse cx="500" cy="400" rx="80" ry="30" class="usecase"/>
        <text x="500" y="400" class="label" text-anchor="middle">Make Reservation</text>
        <text x="500" y="412" class="label" text-anchor="middle">by Phone</text>
        
        <ellipse cx="500" cy="470" rx="80" ry="30" class="usecase"/>
        <text x="500" y="475" class="label" text-anchor="middle">Record Driver Notes</text>
        
        <!-- Use Cases - Column 3 -->
        <ellipse cx="700" cy="190" rx="80" ry="30" class="usecase"/>
        <text x="700" y="190" class="label" text-anchor="middle">Generate Activity</text>
        <text x="700" y="202" class="label" text-anchor="middle">Reports</text>
        
        <ellipse cx="700" cy="260" rx="80" ry="30" class="usecase"/>
        <text x="700" y="265" class="label" text-anchor="middle">Manage User Accounts</text>
        
        <ellipse cx="700" cy="330" rx="80" ry="30" class="usecase"/>
        <text x="700" y="335" class="label" text-anchor="middle">Reset Password</text>
        
        <ellipse cx="700" cy="400" rx="80" ry="30" class="usecase"/>
        <text x="700" y="400" class="label" text-anchor="middle">Enable/Disable</text>
        <text x="700" y="412" class="label" text-anchor="middle">Packages</text>
        
        <ellipse cx="700" cy="470" rx="80" ry="30" class="usecase"/>
        <text x="700" y="475" class="label" text-anchor="middle">Export Reports</text>
        
        <!-- Use Cases - Column 4 -->
        <ellipse cx="900" cy="260" rx="80" ry="30" class="usecase"/>
        <text x="900" y="265" class="label" text-anchor="middle">Update System Content</text>
        
        <ellipse cx="900" cy="330" rx="80" ry="30" class="usecase"/>
        <text x="900" y="335" class="label" text-anchor="middle">Receive DMV Updates</text>
        
        <ellipse cx="900" cy="750" rx="80" ry="30" class="usecase"/>
        <text x="900" y="755" class="label" text-anchor="middle">Track Activity Log</text>
        
        <!-- Associations from Customer -->
        <line x1="105" y1="220" x2="220" y2="120" class="association"/>
        <line x1="105" y1="230" x2="220" y2="190" class="association"/>
        <line x1="105" y1="240" x2="220" y2="260" class="association"/>
        <line x1="105" y1="250" x2="220" y2="330" class="association"/>
        <line x1="105" y1="260" x2="220" y2="400" class="association"/>
        <line x1="105" y1="270" x2="220" y2="470" class="association"/>
        <line x1="110" y1="230" x2="420" y2="120" class="association"/>
        <line x1="110" y1="240" x2="420" y2="190" class="association"/>
        <line x1="110" y1="250" x2="420" y2="260" class="association"/>
        
        <!-- Associations from Secretary -->
        <line x1="105" y1="420" x2="220" y2="330" class="association"/>
        <line x1="105" y1="430" x2="220" y2="400" class="association"/>
        <line x1="105" y1="440" x2="220" y2="470" class="association"/>
        <line x1="110" y1="430" x2="420" y2="400" class="association"/>
        
        <!-- Associations from Driver -->
        <line x1="105" y1="620" x2="220" y2="190" class="association"/>
        <line x1="110" y1="620" x2="420" y2="260" class="association"/>
        <line x1="110" y1="630" x2="420" y2="470" class="association"/>
        
        <!-- Associations from IT Officer -->
        <line x1="1095" y1="280" x2="780" y2="260" class="association"/>
        <line x1="1095" y1="290" x2="780" y2="330" class="association"/>
        <line x1="1095" y1="300" x2="820" y2="260" class="association"/>
        
        <!-- Associations from Owner -->
        <line x1="1095" y1="520" x2="780" y2="190" class="association"/>
        <line x1="1095" y1="530" x2="780" y2="400" class="association"/>
        <line x1="1095" y1="540" x2="780" y2="470" class="association"/>
        <line x1="1095" y1="550" x2="820" y2="750" class="association"/>
        
        <!-- Associations from DMV System -->
        <line x1="1095" y1="770" x2="980" y2="330" class="association"/>
        
    </svg>
</body>
</html>
